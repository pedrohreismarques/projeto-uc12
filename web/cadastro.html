<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="">
    <meta name="keywords" content="">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">

    <title> Cadastro </title>
    <link rel="shortcut icon" href="img/logo_personagem.png" type="image/x-icon">

</head>

<body id="interface">

    <header class="d-flex flex-column flex-md-row align-items-center justify-content-center mb-4 gap-md-4">

        <img id="logo" src="img/logo.png" alt="Logo Center Toys" class="img-fluid">
        <h1 class="fw-bold titulo-pagina mb-0" id="titulo-pagina"> Cadastro de Produtos </h1>

    </header>


    <div class=" container text-center py-3">

        <form class="row mb-3 w-50 mx-auto" name="frmProduto" action="insert">

            <div class="mb-3">

                <input type="text" name="nome" class="form-control" placeholder="Nome do Produto:" maxlength="50"
                    required>

            </div>


            <div class="mb-3">

                <input type="text" name="fab" class="form-control" placeholder="Data de Fabricação:" maxlength="10"
                    oninput="let v=this.value.replace(/\D/g,''); if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2); if(v.length>5) v=v.slice(0,5)+'/'+v.slice(5,9); this.value=v;"
                    required>

            </div>

            <div class="mb-3">

                <select id="inputState" class="form-select" name="categoria" required>

                    <option value="" selected disabled>Selecione uma categoria</option>
                    <option value="Jogos de Tabuleiro">Jogos de Tabuleiro</option>
                    <option value="Jogos Pedagógicos">Jogos Pedagógicos</option>
                    <option value="Blocos de montar">Blocos de montar</option>
                    <option value="Bonecas">Bonecas</option>
                    <option value="Ar Livre">Ar Livre</option>
                    <option value="Quebra-cabeça">Quebra-cabeça</option>
                    <option value="Cartas">Cartas</option>

                </select>

            </div>

            <div class="mb-3">

                <input type="text" name="faixa" class="form-control" placeholder="Faixa Etária: (Ex: 5)"
                    onfocus="this.value = this.value.replace(' anos', '')"
                    onblur="if(this.value && !this.value.includes(' anos')) this.value += ' anos'" required>

            </div>


            <div class="mb-3">

                <input type="text" name="preco" class="form-control" value="R$ 0.00"
                    oninput="this.value = (Number(this.value.replace(/\D/g, '')) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })"
                    required>

            </div>

        </form>

        <div class="d-grid gap-2 col-3 mx-auto">

            <a class="btn btn-primary" id="botaoAzul" type="button" onclick="validar()"> Cadastrar </a>
            <a class="btn btn-primary" id="botaoVermelho" type="button" href="produtos.html"> Voltar </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="scripts/validador.js"></script>

</body>

</html>
